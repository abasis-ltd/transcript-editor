<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <title>
    <%= project["name"] %>
  </title>
  <meta name="description" content="<%= project[" description"] %>">

  <!-- Link to the merged stylesheet -->
  <link rel="stylesheet" href="/<%= project_key %>/assets/css/styles.css">
</head>

<body>

  <!-- The .container class is now on the main app div -->
  <div class="container">

    <!-- Use <header> tag and apply .site-header class -->
    <header class="site-header">
      <!-- Add .logo class to the title container -->
      <div id="header-title" class="title-container logo">
      <a href="/" class="site-logo" style="display:inline-block;vertical-align:middle;text-decoration:none;">
          <span style="margin-left:12px;vertical-align:middle;"><%= project["name"] %></span>
        </a>
      </div>
      <!-- Add .nav-links class to the menu container -->
      <div id="primary-menu-container" class="menu-container nav-links"></div>
    </header>


    <div id="main" class="body">

    </div>

    <!-- Use <footer> tag and apply .site-footer class -->
    <footer class="site-footer">
      <!-- Add .footer-links class to the menu container -->
      <div id="footer-menu-container" class="menu-container footer-links"></div>
      <p style="margin-top: 20px;">Powered by <a href="https://www.abasis.ai/" target="_blank">Abasis Limited</a></p>
      <p style="margin-top: 20px;">&copy; 2025 Let's Give Cyprus a Voice. All Rights Reserved.</p>
    </footer>

  </div>

  <!-- json payload -->
  <script src="/<%= project_key %>/project.js?v=1"></script>
  <!-- all templates -->
  <script src="/assets/js/templates.js?v=1"></script>

  <script>
    // The platform's JavaScript is looking for an element with the class '.autoplay-button'.
    // If it doesn't exist, we create a dummy, hidden one to prevent the error.
    if (!document.getElementById('autoplay')) {
        var dummyButton = document.createElement('button');
        dummyButton.id = 'autoplay'; // Use the correct ID
        //dummyButton.style.display = 'none'; // Make it invisible
        document.body.appendChild(dummyButton);
      }
  </script>
  <!-- minified bundle of assets from default.js file -->
  <script src="/assets/js/default.min.js?v=1"></script>
  <!-- custom js -->
  <script src="/<%= project_key %>/assets/js/custom.js?v=1"></script>

  <% if (project["gaCode"]) { %>
    <script>
      (function (i, s, o, g, r, a, m) {
        i['GoogleAnalyticsObject'] = r; i[r] = i[r] || function () {
          (i[r].q = i[r].q || []).push(arguments)
        }, i[r].l = 1 * new Date(); a = s.createElement(o),
          m = s.getElementsByTagName(o)[0]; a.async = 1; a.src = g; m.parentNode.insertBefore(a, m)
      })(window, document, 'script', '//www.google-analytics.com/analytics.js', 'ga');

      ga('create', '<%= project["gaCode"] %>', 'auto');
      ga('send', 'pageview');

    </script>
    <% } %>
</body>

</html>
